name = "outspire-push"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[kv_namespaces]]
binding = "OUTSPIRE_KV"
id = "a8ada3a1a83f412ba0c172ef0fb80c63"

[triggers]
# Daily planner: 22:30 UTC = 06:30 CST — builds dispatch slots for all users
# Per-minute dispatch: UTC 23:00–10:59 = CST 07:00–18:59 (covers school hours + buffer)
# On non-school days, dispatch slots are empty so each tick is 1 KV read (null) → no-op
crons = ["30 22 * * *", "* 23 * * *", "* 0-10 * * *"]

[vars]
GITHUB_CALENDAR_URL = "https://raw.githubusercontent.com/Computerization/wfla-events/main"
HOLIDAY_CN_URL = "https://cdn.jsdelivr.net/gh/NateScarlet/holiday-cn@master"
APNS_BUNDLE_ID = "dev.wrye.Outspire"
