name = "outspire-push"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[kv_namespaces]]
binding = "OUTSPIRE_KV"
id = "a8ada3a1a83f412ba0c172ef0fb80c63"

[[d1_databases]]
binding = "OUTSPIRE_DB"
database_name = "outspire-push"
database_id = "9b14bbcd-ffed-4ee3-87d5-20aae9497aa3"

[triggers]
# Daily planner: 22:30 UTC = 06:30 CST
# Dispatch window: UTC 23:00–08:59 = CST 07:00–16:59
# Covers 07:45 push-to-start through end-of-day update/end pushes.
crons = ["30 22 * * *", "* 23 * * *", "* 0-8 * * *"]

[vars]
GITHUB_CALENDAR_URL = "https://raw.githubusercontent.com/Computerization/wfla-events/main"
HOLIDAY_CN_URL = "https://cdn.jsdelivr.net/gh/NateScarlet/holiday-cn@master"
APNS_BUNDLE_ID = "dev.wrye.Outspire"
